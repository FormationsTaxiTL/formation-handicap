<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation Sensibilisation au Handicap – Taxi TL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EEF2F7;min-height:100vh;padding:1.5rem 1rem;color:#1a1a2e;line-height:1.65}
.app{max-width:780px;margin:0 auto}
.app-title{text-align:center;margin-bottom:1.5rem}
.app-title h1{font-size:20px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.app-title p{font-size:13px;color:#5C6B80}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.mod-dots{display:flex;gap:5px;flex:1}
.dot{height:7px;flex:1;border-radius:4px;background:#C8D3E0;transition:background .3s}
.dot.done{background:#1A56A0}.dot.active{background:#0D3875}
.top-label{font-size:12px;color:#5C6B80;white-space:nowrap;font-weight:500}
.card{background:#fff;border:1px solid #C8D3E0;border-radius:14px;overflow:hidden;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-header{padding:1.1rem 1.4rem .85rem;border-bottom:1px solid #E5EBF2}
.mod-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;display:inline-block;margin-bottom:7px;letter-spacing:.03em;text-transform:uppercase}
.card-title{font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:3px}
.card-sub{font-size:13px;color:#5C6B80}
.card-body{padding:1.4rem}
.illu{width:100%;margin-bottom:1.3rem;border-radius:9px;overflow:hidden;border:1px solid #E5EBF2;background:#F5F8FC}
.obj{background:#EEF2F7;border-left:4px solid #1A56A0;border-radius:0 8px 8px 0;padding:11px 15px;margin-bottom:1.4rem}
.obj-label{font-size:10px;font-weight:700;color:#0D3875;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.obj-text{font-size:13px;color:#2a3a4e;line-height:1.6}
.section{margin-bottom:1.4rem}
.stitle{font-size:11px;font-weight:700;color:#1a1a2e;background:#EEF2F7;padding:6px 12px;border-radius:6px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.pt{padding:8px 0 8px 20px;border-bottom:1px solid #EEF2F7;position:relative;font-size:13.5px;color:#2a3a4e;line-height:1.65}
.pt:last-child{border-bottom:none}
.pt::before{content:"";position:absolute;left:5px;top:16px;width:6px;height:6px;border-radius:50%;background:#1A56A0}
.pt strong{font-weight:700;color:#1a1a2e}
.kpi{display:inline-block;background:#DCEAF8;color:#0D3875;font-weight:700;padding:1px 7px;border-radius:5px;font-size:13px}
.enc{border-radius:9px;padding:12px 15px;margin:10px 0;font-size:13px;line-height:1.65}
.enc-b{background:#DCEAF8;border:1px solid #90BAE0;color:#0D3875}
.enc-g{background:#E3F5E8;border:1px solid #87CDA0;color:#0A4020}
.enc-a{background:#FEF3DC;border:1px solid #F5C96A;color:#412402}
.enc-r{background:#FCEBEB;border:1px solid #F09595;color:#501313}
.enc strong{font-weight:700;display:block;margin-bottom:3px}
.sit{background:#F5F8FC;border:1px solid #C8D3E0;border-radius:9px;padding:13px 15px;margin:12px 0}
.sit-lbl{font-size:10px;font-weight:700;color:#5C6B80;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.sit-txt{font-size:13px;color:#2a3a4e;line-height:1.65;font-style:italic}
.src{font-size:11px;color:#8090A0;margin-top:.8rem;padding-top:.8rem;border-top:1px solid #EEF2F7}
.btn-main{width:100%;padding:13px;border-radius:9px;border:1px solid #1A56A0;background:#DCEAF8;color:#0D3875;font-size:14px;font-weight:700;cursor:pointer;margin-top:.8rem;transition:background .15s}
.btn-main:hover{background:#90BAE0}
.qbar{display:flex;gap:5px;margin-bottom:1rem}
.qb{flex:1;height:5px;border-radius:3px;background:#C8D3E0;transition:background .3s}
.qmeta{display:flex;justify-content:space-between;margin-bottom:.6rem}
.qn{font-size:12px;color:#5C6B80;font-weight:600}
.qsc{font-size:12px;color:#1A56A0;font-weight:700}
.qtxt{font-size:14.5px;font-weight:700;color:#1a1a2e;margin-bottom:1rem;line-height:1.55}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{padding:12px 15px;border-radius:9px;border:1px solid #C8D3E0;background:#fff;color:#1a1a2e;font-size:13.5px;cursor:pointer;text-align:left;transition:all .15s;line-height:1.45}
.opt:hover:not(:disabled){background:#EEF2F7;border-color:#8090A0}
.opt.ok{border-color:#1A6B3A;background:#E3F5E8;color:#0A4020;font-weight:600}
.opt.ko{border-color:#A32D2D;background:#FCEBEB;color:#501313}
.opt:disabled{cursor:default}
.fb{padding:13px 15px;border-radius:9px;margin-top:1rem;font-size:13px;line-height:1.65}
.fb.ok{background:#E3F5E8;color:#0A4020;border:1px solid #1A6B3A}
.fb.ko{background:#FCEBEB;color:#501313;border:1px solid #A32D2D}
.fb-t{font-weight:700;margin-bottom:4px}
.fb-r{font-size:11px;color:#8090A0;margin-top:6px;font-style:italic}
.box-ok{background:#DCEAF8;border:1px solid #1A56A0;border-radius:12px;padding:1.5rem;text-align:center;margin-top:1rem}
.box-ok h3{font-size:15px;font-weight:700;color:#0D3875;margin-bottom:7px}
.box-ok p{font-size:13px;color:#1A56A0;margin-bottom:1.1rem;line-height:1.55}
.btn-ok{display:inline-block;padding:10px 28px;border-radius:8px;border:1px solid #1A56A0;background:#DCEAF8;color:#0D3875;font-size:13px;font-weight:700;cursor:pointer}
.btn-ok:hover{background:#90BAE0}
.btn-nxt{display:inline-block;padding:11px 24px;border-radius:8px;border:1px solid #1A56A0;background:#DCEAF8;color:#0D3875;font-size:13px;font-weight:700;cursor:pointer;margin-top:.8rem}
.id-wrap{background:#fff;border:1px solid #C8D3E0;border-radius:16px;padding:2.2rem;max-width:500px;margin:0 auto;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.id-head{text-align:center;margin-bottom:1.6rem}
.id-head h2{font-size:19px;font-weight:700;color:#1a1a2e;margin:.6rem 0 .3rem}
.id-head p{font-size:13px;color:#5C6B80;line-height:1.55}
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;font-weight:700;color:#3a4a5e;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select{width:100%;padding:11px 13px;border-radius:8px;border:1px solid #C8D3E0;font-size:14px;color:#1a1a2e;background:#fff;outline:none;transition:border .15s;font-family:inherit}
.field input:focus,.field select:focus{border-color:#1A56A0;box-shadow:0 0 0 3px rgba(26,86,160,.1)}
.id-note{background:#EEF2F7;border-radius:8px;padding:10px 13px;font-size:11.5px;color:#5C6B80;margin-bottom:1.3rem;line-height:1.6}
.cert{background:#fff;border:2px solid #1A56A0;border-radius:16px;overflow:hidden}
.cert-top{background:#0D3875;padding:1.6rem;text-align:center}
.cert-top h2{font-size:19px;font-weight:700;color:#fff;margin-bottom:5px}
.cert-top p{font-size:12px;color:#90BAE0;line-height:1.55}
.cert-body{padding:1.6rem}
.cert-comp{text-align:center;margin-bottom:1.3rem}
.cert-comp span{display:inline-block;background:#DCEAF8;border:1px solid #1A56A0;border-radius:6px;padding:6px 18px;font-size:11px;color:#0D3875;font-weight:700;letter-spacing:.04em}
.cert-who{text-align:center;padding-bottom:1.3rem;border-bottom:1px solid #E5EBF2;margin-bottom:1.3rem}
.cert-who .lbl{font-size:10px;color:#5C6B80;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.cert-who .nm{font-size:25px;font-weight:700;color:#1a1a2e}
.cert-who .svc{font-size:13px;color:#5C6B80;margin-top:3px}
.cert-stmt{font-size:13px;color:#2a3a4e;line-height:1.7;margin-bottom:1.3rem;text-align:center}
.cert-mods{display:flex;flex-direction:column;gap:8px;margin-bottom:1.3rem}
.cert-mod{display:flex;align-items:center;gap:11px;padding:10px 13px;background:#DCEAF8;border-radius:8px;border:1px solid #90BAE0}
.cert-ck{width:23px;height:23px;border-radius:50%;background:#1A56A0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#fff;font-weight:700}
.cert-info{flex:1}
.cert-mn{font-size:13px;color:#0D3875;font-weight:700}
.cert-mr{font-size:11px;color:#1A56A0}
.cert-ft{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding-top:1rem;border-top:1px solid #E5EBF2;margin-bottom:1.2rem}
.cert-fi .lbl{font-size:10px;color:#5C6B80;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.cert-fi .val{font-size:12px;font-weight:700;color:#1a1a2e}
.cert-sig{text-align:center;border-top:1px solid #E5EBF2;padding-top:1rem;font-size:11px;color:#5C6B80;line-height:1.65}
.print-row{display:flex;gap:8px;margin-top:1rem}
.btn-print{flex:1;padding:12px;border-radius:8px;border:1px solid #1A56A0;background:#DCEAF8;color:#0D3875;font-size:13px;font-weight:700;cursor:pointer}
.btn-print:hover{background:#90BAE0}
.btn-mail{flex:1;padding:12px;border-radius:8px;border:1px solid #C8D3E0;background:#fff;color:#1a1a2e;font-size:13px;font-weight:700;cursor:pointer}
.btn-mail:hover{background:#EEF2F7}
.mail-tip{background:#EEF2F7;border-radius:8px;padding:11px 13px;font-size:12px;color:#5C6B80;margin-top:.8rem;line-height:1.6;display:none}
/* Écran mot de passe */
#pwd-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#EEF2F7;display:flex;align-items:center;justify-content:center;z-index:9999}
@media print{body{background:#fff;padding:0}.top-bar,.app-title,.print-row,.mail-tip{display:none!important}.card{box-shadow:none}.cert{border:2px solid #1A56A0;-webkit-print-color-adjust:exact;print-color-adjust:exact}.cert-top,.cert-mod{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>

secs:[
{t:"La définition légale — ce que dit la loi française",pts:[
"<strong>La loi du 11 février 2005 (article 114) :</strong> constitue un handicap toute limitation d'activité ou restriction de participation à la vie en société subie dans son environnement par une personne en raison d'une altération substantielle, durable ou définitive d'une ou plusieurs fonctions physiques, sensorielles, mentales, cognitives ou psychiques, d'un polyhandicap ou d'un trouble de santé invalidant.",
"<strong>Ce que cette définition change :</strong> le handicap n'est plus seulement médical — c'est l'interaction entre une déficience et un environnement inadapté. Une personne en fauteuil dans un bâtiment entièrement accessible n'est pas en situation de handicap. C'est l'environnement qui crée ou réduit la situation de handicap.",
"<strong>Visible ou invisible, permanent ou temporaire :</strong> le handicap peut survenir à tout moment — accident, maladie, vieillissement. Il n'est pas réservé aux personnes nées avec une déficience. <span class='kpi'>80 % des handicaps sont invisibles</span> : troubles cognitifs, maladies chroniques, handicap psychique.",
"<strong>Le handicap peut vous concerner :</strong> avec 12 millions de personnes concernées en France, soit 18 % de la population, le handicap touche l'entourage professionnel et personnel de chacun. La probabilité de travailler un jour avec un collègue en situation de handicap est très élevée.",
"<div class='enc enc-b'><strong>AGEFIPH 2024 :</strong> 3,3 millions de personnes sont reconnues administrativement handicapées en France — en hausse de 8 % en un an. Parmi elles, 1,35 million sont en emploi, soit 4,8 % des actifs occupés.</div>"
]},
{t:"Les chiffres qui redimensionnent les idées reçues",pts:[
"<strong>Le taux de chômage des personnes handicapées :</strong> <span class='kpi'>12 %</span> — soit presque le double du taux de chômage de la population générale (7 %). Seuls 32 % accèdent à l'emploi dans les 6 mois suivant leur inscription à France Travail, contre 53 % pour les autres demandeurs.",
"<strong>Le regard des salariés évolue :</strong> selon le baromètre AGEFIPH-IFOP 2025, 80 % des salariés perçoivent le travail avec une personne handicapée comme source d'enrichissement et de nouvelles façons de travailler. 57 % de ceux qui ont côtoyé un collègue handicapé reconnaissent un impact positif sur leur vision du handicap.",
"<strong>Le frein principal : le manque de connaissance.</strong> 76 % du grand public perçoit l'embauche d'une personne handicapée comme difficile — non par mauvaise volonté, mais par méconnaissance. La sensibilisation est le levier le plus efficace pour changer cette perception.",
"<div class='sit'><div class='sit-lbl'>Mise en perspective</div><div class='sit-txt'>Sur un plateau de 20 téléopérateurs, en appliquant les données AGEFIPH, 1 à 2 personnes sont statistiquement en situation de handicap. Certains l'ont déclaré, d'autres non. Certains handicaps sont visibles, la plupart ne le sont pas. La sensibilisation de toute l'équipe bénéficie à tous.</div></div>"
]},
{t:"Pourquoi parler de 'personne en situation de handicap' et pas 'personne handicapée'",pts:[
"<strong>Le changement de vocabulaire reflète un changement de regard :</strong> 'personne en situation de handicap' met la personne d'abord, et rappelle que c'est la situation — pas la personne — qui est handicapante. Ce n'est pas une question de politiquement correct — c'est une façon de voir qui change l'approche.",
"<strong>Ce qu'il ne faut pas dire :</strong> 'handicapé', 'invalide', 'souffre de', 'est atteint de', 'victime de'. Ces formulations réduisent la personne à sa déficience. On dit : 'personne en situation de handicap', 'personne avec un trouble de', 'personne qui utilise un fauteuil roulant'.",
"<strong>La bonne posture :</strong> ne pas sur-adapter son comportement, ne pas traiter différemment, ne pas parler plus fort ou plus lentement sans raison. La meilleure attitude est naturelle et respectueuse — exactement comme avec n'importe quel collègue.",
"<div class='enc enc-g'><strong>À retenir :</strong> le handicap fait partie de la diversité humaine. La majorité des situations de handicap en entreprise ne nécessitent pas d'aménagements lourds ou coûteux — souvent, un aménagement simple du poste ou de l'organisation suffit.</div>"
]}
],
quiz:[
{q:"Selon la loi française de 2005, qu'est-ce qui définit une 'situation de handicap' ?",opts:["Uniquement les déficiences physiques visibles","L'interaction entre une déficience et un environnement inadapté qui crée une limitation d'activité","Le fait d'avoir une reconnaissance administrative officielle","Toute déficience présente depuis la naissance"],ans:1,exp:"La loi de 2005 a transformé la conception du handicap : ce n'est plus seulement une question médicale. C'est l'environnement qui peut créer ou réduire la situation de handicap. Une même déficience peut être handicapante dans un environnement inadapté et pas du tout handicapante dans un environnement accessible.",ref:"Source : Loi n°2005-102 du 11 février 2005, article 114"},
{q:"Quelle proportion des handicaps est invisible (non apparent physiquement) ?",opts:["20 %","50 %","80 %","Moins de 10 % — la plupart sont visibles"],ans:2,exp:"80 % des handicaps sont invisibles : troubles cognitifs (dyslexie, TDAH, autisme), handicap psychique (dépression chronique, troubles anxieux), maladies invalidantes (diabète, épilepsie, sclérose en plaques). C'est pourquoi on ne peut pas 'voir' si quelqu'un est en situation de handicap.",ref:"Source : AGEFIPH, données observatoire 2024 ; info.gouv.fr"},
{q:"Quel est le taux de chômage des personnes en situation de handicap en France en 2024 ?",opts:["Identique à la moyenne nationale — 7 %","Légèrement supérieur — 9 %","Le double de la moyenne nationale — 12 %","Trois fois supérieur — 21 %"],ans:2,exp:"Le taux de chômage des personnes en situation de handicap est de 12 % — soit presque le double du taux de chômage général (7 %). De plus, seuls 32 % accèdent à l'emploi dans les 6 mois après inscription, contre 53 % pour les autres demandeurs d'emploi.",ref:"Source : AGEFIPH, tableau de bord emploi et chômage 2024"},
{q:"Parmi ces formulations, laquelle est la plus adaptée ?",opts:["'Il est handicapé moteur'","'Elle souffre d'un handicap visuel'","'C'est un invalide'","'Il est en situation de handicap moteur' ou 'il utilise un fauteuil roulant'"],ans:3,exp:"Les formulations qui mettent la personne en premier ('personne en situation de handicap') sont préférables. Elles rappellent que c'est la situation qui est handicapante, pas la personne. Les termes 'invalide', 'souffre de', 'victime de' réduisent la personne à sa déficience.",ref:"Source : AGEFIPH, guide du bon vocabulaire ; Charte Romain Jacob"},
{q:"Selon le baromètre AGEFIPH-IFOP 2025, comment les salariés ayant travaillé avec un collègue handicapé perçoivent-ils cette expérience ?",opts:["Comme une contrainte supplémentaire pour l'équipe","Comme une expérience neutre sans impact particulier","57 % reconnaissent un impact positif sur leur vision du handicap","La majorité souhaite ne pas recommencer l'expérience"],ans:2,exp:"57 % des salariés ayant côtoyé un collègue en situation de handicap reconnaissent un impact positif sur leur vision du handicap. Et 80 % des salariés perçoivent le travail avec une personne handicapée comme source d'enrichissement. L'expérience directe est le meilleur levier de changement des représentations.",ref:"Source : Baromètre AGEFIPH-IFOP 2025, 8ème édition"}
]},

secs:[
{t:"Handicap moteur — bien plus que le fauteuil roulant",pts:[
"<strong>Définition :</strong> le handicap moteur désigne une capacité limitée à se déplacer, réaliser des gestes ou bouger certaines parties du corps. Il touche environ 2,4 millions de personnes en France.",
"<strong>Idée reçue à déconstruire :</strong> tous les handicaps moteurs ne nécessitent pas de fauteuil roulant. Certaines personnes se déplacent avec des cannes, béquilles ou déambulateur. D'autres n'ont aucune aide visible mais souffrent de limitations importantes — douleurs chroniques, fatigabilité, difficultés de préhension.",
"<strong>Au quotidien en entreprise :</strong> un collègue en situation de handicap moteur peut avoir besoin d'un bureau adapté, d'un accès facilité, de temps supplémentaire pour se déplacer d'une salle à l'autre. Demandez-lui directement ce qui lui serait utile — c'est lui le meilleur expert de ses besoins.",
"<div class='enc enc-b'><strong>Bon réflexe :</strong> si vous proposez de l'aide à une personne en situation de handicap moteur, attendez son accord avant d'agir. Prendre le fauteuil de quelqu'un sans le demander est vécu comme intrusif. La règle : proposer, ne jamais imposer.</div>"
]},
{t:"Handicap sensoriel et handicap psychique — les plus fréquents en entreprise",pts:[
"<strong>Handicap auditif :</strong> 6 millions de personnes malentendantes en France. Quatre degrés de déficience, du léger au profond. Beaucoup compensent en lisant sur les lèvres — ce qui génère une fatigue cognitive intense non visible. En réunion ou au téléphone, assurez-vous d'articuler clairement et de ne pas parler en vous tournant.",
"<strong>Handicap visuel :</strong> 2 millions de personnes concernées. La déficience visuelle est multiforme — de la malvoyance à la cécité complète. Un collègue malvoyant peut utiliser des outils d'agrandissement, de lecture vocale, ou travailler avec des contrastes élevés. L'identifier ne signifie pas le surprotéger.",
"<strong>Handicap psychique — le moins bien accepté :</strong> le baromètre AGEFIPH-IFOP 2025 révèle qu'un tiers des salariés déclare qu'il ne serait pas prêt à travailler avec une personne en situation de handicap psychique. Pourtant, 13 millions de Français sont concernés par des troubles de santé mentale. Ce handicap se caractérise par sa variabilité : une personne peut être très performante pendant des semaines puis traverser une période difficile.",
"<strong>Ce que le handicap psychique n'est pas :</strong> une faiblesse de caractère, de la simulation, un danger pour l'entourage. Les personnes concernées ont des maladies réelles — dépression chronique, troubles anxieux, bipolarité — qui nécessitent des soins, comme un diabète ou une maladie cardiaque.",
"<div class='enc enc-a'><strong>Clé du handicap psychique en entreprise :</strong> la régularité et la prévisibilité de l'environnement de travail sont particulièrement importantes. Éviter les changements brusques, communiquer clairement les plannings, faire des points réguliers — ces aménagements simples peuvent faire une grande différence.</div>"
]},
{t:"Handicap cognitif et handicap invisible — la réalité quotidienne",pts:[
"<strong>Handicap cognitif :</strong> il résulte de dysfonctionnements des fonctions cognitives — attention, mémoire, langage, adaptation au changement. Il inclut les troubles dys (dyslexie, dyspraxie, dyscalculie), le TDAH, l'autisme sans déficience intellectuelle, et les séquelles de traumatismes crâniens. <span class='kpi'>Aucun lien avec l'intelligence</span>.",
"<strong>La dyslexie en entreprise :</strong> un collègue dyslexique peut exceller à l'oral, dans la créativité ou le raisonnement spatial, tout en ayant des difficultés avec les documents écrits ou les délais courts. Proposer des alternatives à l'écrit (oral, dictaphone, délais adaptés) est un aménagement simple et efficace.",
"<strong>Le TDAH au travail :</strong> un collègue avec un TDAH peut avoir des difficultés à maintenir la concentration sur des tâches répétitives, à gérer les priorités ou à respecter des délais. En contrepartie, il peut avoir une créativité et une capacité d'hyperfocus remarquables sur les sujets qui l'intéressent.",
"<strong>Le handicap invisible :</strong> maladies chroniques (diabète, épilepsie, cancer en rémission, sclérose en plaques), douleurs chroniques, fatigue invalidante — tous ces situations constituent des handicaps au sens de la loi mais ne se voient pas. La personne peut avoir l'air 'normale' tout en gérant une contrainte médicale quotidienne.",
"<div class='sit'><div class='sit-lbl'>Situation en entreprise</div><div class='sit-txt'>Marc est un excellent téléopérateur, créatif, efficace à l'oral. Mais il est souvent en retard dans ses comptes-rendus écrits et semble 'désorganisé'. Ses collègues le trouvent négligent. En réalité, Marc est dyslexique — ce qu'il n'a pas déclaré par peur du regard des autres. Un simple aménagement (dictaphone pour les notes, délai supplémentaire pour les écrits) lui permettrait de travailler dans de meilleures conditions.</div></div>"
]}
],
quiz:[
{q:"Un collègue semble 'normal' mais vous apprenez qu'il est en situation de handicap. Quelle est la réaction la plus adaptée ?",opts:["Douter — s'il a l'air normal, il n'est probablement pas vraiment handicapé","Adapter votre comportement comme si la personne était fragile, pour montrer que vous êtes bienveillant","Continuer à travailler normalement avec lui — 80% des handicaps sont invisibles et ne changent pas nécessairement votre relation","Lui demander immédiatement ce dont il a besoin, même si la question n'est pas appropriée"],ans:2,exp:"80 % des handicaps sont invisibles. La situation de handicap ne change pas fondamentalement la relation professionnelle dans la majorité des cas. La meilleure attitude est naturelle et respectueuse — la même qu'avec tout collègue. Si la personne a besoin d'aménagements, elle en parlera, ou le manager gérera avec elle.",ref:"Source : AGEFIPH, guide du management inclusif ; Loi 2005-102"},
{q:"Le handicap psychique est cité comme 'le moins accepté' dans le baromètre AGEFIPH-IFOP 2025. Pour quelle raison principale ?",opts:["Il est plus fréquent que les autres types de handicap","Il y a beaucoup de préjugés non fondés — l'idée fausse que ces personnes sont dangereuses ou peu fiables","Il génère davantage d'aménagements coûteux pour l'entreprise","Il est le seul type de handicap à affecter les performances professionnelles"],ans:1,exp:"Le handicap psychique souffre de nombreux préjugés : les personnes concernées seraient 'dangereuses', 'faibles', 'simulatrices'. Ces idées sont infondées. Le handicap psychique résulte de maladies réelles — comme un diabète ou une maladie cardiaque. Les personnes concernées ont des capacités professionnelles réelles, avec des besoins d'aménagements spécifiques.",ref:"Source : Baromètre AGEFIPH-IFOP 2025 ; Catalyseurs de l'Inclusion"},
{q:"Qu'est-ce que le handicap cognitif ?",opts:["Une déficience intellectuelle globale qui réduit les capacités de compréhension","Un dysfonctionnement des fonctions cognitives (mémoire, attention, langage) sans lien nécessaire avec l'intelligence","Un handicap lié au système nerveux, similaire au handicap moteur","Un handicap uniquement congénital, présent dès la naissance"],ans:1,exp:"Le handicap cognitif résulte de dysfonctionnements des fonctions cognitives — attention, mémoire, langage, adaptation — sans implquer nécessairement de déficience intellectuelle. La dyslexie, le TDAH, l'autisme sans DI en font partie. Une personne dyslexique peut avoir une intelligence très élevée et exceller dans de nombreux domaines.",ref:"Source : Ministère des Familles et du Handicap ; info.gouv.fr, comprendre les handicaps"},
{q:"Un collègue vous demande de l'aide pour se déplacer avec son fauteuil roulant. Quelle est la bonne attitude ?",opts:["L'aider immédiatement sans lui demander comment faire","Refuser poliment — il vaut mieux ne pas intervenir sur le matériel de quelqu'un","Proposer votre aide, demander comment vous pouvez l'aider, et agir selon ses indications","Appeler quelqu'un de plus qualifié pour l'aider"],ans:2,exp:"La règle est : proposer, ne jamais imposer, et toujours demander à la personne comment elle souhaite être aidée. Elle est l'experte de ses propres besoins. Agir sans demander — même avec les meilleures intentions — peut être perçu comme intrusif ou dangereux.",ref:"Source : AGEFIPH, guide de l'accueil et de l'accompagnement"},
{q:"Une personne avec une maladie chronique non visible (diabète, épilepsie, cancer en rémission) est-elle en situation de handicap au sens de la loi ?",opts:["Non — le handicap est réservé aux déficiences physiques visibles","Non — uniquement si la maladie l'empêche totalement de travailler","Oui — si la maladie entraîne une limitation durable de l'activité, c'est un handicap au sens de la loi 2005","Seulement si elle a obtenu une reconnaissance RQTH officielle"],ans:2,exp:"La loi de 2005 inclut explicitement 'les troubles de santé invalidants'. Une maladie chronique qui entraîne une limitation durable de l'activité constitue un handicap, qu'elle soit visible ou non, qu'elle ait été reconnue administrativement ou non. C'est pourquoi 80 % des handicaps sont invisibles.",ref:"Source : Loi n°2005-102 du 11 février 2005, article 114"}
]},

secs:[
{t:"L'Obligation d'Emploi des Travailleurs Handicapés (OETH)",pts:[
"<strong>Le principe :</strong> depuis la loi de 2005, toute entreprise de 20 salariés et plus a l'obligation d'employer au minimum <span class='kpi'>6 % de travailleurs handicapés</span>. En 2024, le taux d'emploi direct dans le secteur privé est de 4 % — en progression, mais encore en dessous de l'objectif.",
"<strong>Si l'entreprise n'atteint pas 6 % :</strong> elle verse une contribution à l'AGEFIPH. Le montant dépend de la taille de l'entreprise et du nombre de postes manquants. Pour une entreprise de moins de 250 salariés, le barème est de 400 SMIC horaire par bénéficiaire manquant.",
"<strong>Comment s'acquitter de l'OETH :</strong> en embauchant des personnes reconnues handicapées (BOETH), mais aussi en faisant appel à des entreprises adaptées (EA) ou à des établissements et services d'aide par le travail (ESAT) pour des prestations de sous-traitance.",
"<strong>La déclaration :</strong> depuis 2020, la déclaration de l'OETH se fait via la Déclaration Sociale Nominative (DSN) mensuelle — chaque salarié BOETH est déclaré par l'employeur.",
"<div class='enc enc-b'><strong>Pourquoi c'est important pour vous :</strong> si un collègue vous annonce qu'il est reconnu travailleur handicapé, c'est une information confidentielle. Elle ne doit pas circuler dans l'équipe sans son accord. Elle est utile à l'entreprise pour ses obligations légales, mais elle reste personnelle.</div>"
]},
{t:"La RQTH — Reconnaissance de la Qualité de Travailleur Handicapé",pts:[
"<strong>Ce que c'est :</strong> la RQTH est une reconnaissance administrative délivrée par la MDPH (Maison Départementale des Personnes Handicapées). Elle atteste que la personne est bénéficiaire de l'obligation d'emploi des travailleurs handicapés.",
"<strong>C'est une démarche volontaire :</strong> personne ne peut obliger un salarié à demander une RQTH. C'est une démarche personnelle, confidentielle, que le salarié choisit de faire ou non. Certaines personnes préfèrent ne pas la demander par peur de la discrimination ou du regard des autres.",
"<strong>Ce que ça ouvre comme droits :</strong> aménagement du poste de travail financé par l'AGEFIPH, formations spécifiques, maintien dans l'emploi en cas d'inaptitude partielle, priorité de reclassement, accès à des aides à la mobilité. La RQTH protège le salarié.",
"<strong>La durée :</strong> la RQTH est valable 1 à 5 ans renouvelable. Elle peut être demandée à tout moment de la carrière — après un accident, la survenue d'une maladie, ou la découverte tardive d'un trouble cognitif.",
"<div class='enc enc-g'><strong>Le rôle du manager :</strong> si un salarié vous informe de sa RQTH, traitez cette information avec confidentialité. Informez les RH pour les aspects administratifs. Ne divulguez pas cette information à l'équipe sans l'accord du salarié. C'est une protection pour lui, pas une contrainte pour vous.</div>"
]},
{t:"L'AGEFIPH — votre partenaire pour l'inclusion",pts:[
"<strong>Ce qu'est l'AGEFIPH :</strong> l'Association de Gestion du Fonds pour l'Insertion Professionnelle des Personnes Handicapées. Elle gère les contributions des entreprises qui n'atteignent pas le quota de 6 % et les réinvestit en aides à l'inclusion.",
"<strong>Les aides disponibles pour les entreprises :</strong> financement d'aménagements de postes (matériel adapté, logiciels spécialisés, mobilier ergonomique), aide à l'embauche, aide à la formation, accompagnement au maintien dans l'emploi. En 2024, 97 % des entreprises bénéficiaires se déclarent satisfaites.",
"<strong>Cap emploi :</strong> opérateur spécialisé du réseau AGEFIPH-FIPHFP, Cap emploi accompagne les personnes handicapées dans leur recherche d'emploi et les entreprises dans leurs recrutements inclusifs. En 2025, 15 500 personnes ont été maintenues dans l'emploi grâce à ces interventions.",
"<strong>La MDPH :</strong> la Maison Départementale des Personnes Handicapées est le guichet unique pour toutes les démarches liées au handicap — demande de RQTH, d'AAH (Allocation aux Adultes Handicapés), de PCH (Prestation de Compensation du Handicap). Présente dans chaque département.",
"<div class='sit'><div class='sit-lbl'>Situation en entreprise</div><div class='sit-txt'>Sophie, 38 ans, vient d'apprendre qu'elle est atteinte d'une sclérose en plaques. Elle hésite à demander une RQTH, craignant d'être perçue différemment par ses collègues. Le manager lui explique que la RQTH est confidentielle, qu'elle permettrait de financer un fauteuil de bureau adapté et des aménagements d'horaires, et que l'AGEFIPH peut accompagner l'entreprise. Sophie décide de faire la démarche — et continue à travailler normalement, avec plus de confort.</div></div>"
]}
],
quiz:[
{q:"À partir de combien de salariés une entreprise est-elle soumise à l'obligation d'emploi de travailleurs handicapés ?",opts:["10 salariés","20 salariés","50 salariés","100 salariés"],ans:1,exp:"Depuis la loi de 2005, toutes les entreprises de 20 salariés et plus sont soumises à l'OETH — Obligation d'Emploi des Travailleurs Handicapés — avec un quota de 6 % de leur effectif.",ref:"Source : Code du travail L5212-1 ; Loi 2005-102"},
{q:"Qu'est-ce que la RQTH ?",opts:["Un diplôme spécifique pour les personnes handicapées","Une reconnaissance administrative qui atteste du statut de travailleur handicapé, délivrée par la MDPH","Un contrat de travail adapté pour les personnes handicapées","Une aide financière versée directement au salarié handicapé"],ans:1,exp:"La RQTH est la Reconnaissance de la Qualité de Travailleur Handicapé. C'est une reconnaissance administrative délivrée par la MDPH, volontaire et confidentielle, qui ouvre des droits à des aménagements de poste, des formations spécifiques et une protection renforcée.",ref:"Source : MDPH ; AGEFIPH, guide de la RQTH"},
{q:"Un salarié vous informe en privé qu'il vient d'obtenir une RQTH. Quelle est la conduite adaptée ?",opts:["Informer l'équipe pour qu'elle soit prévenue et bienveillante","Traiter cette information avec confidentialité, informer les RH pour les aspects administratifs, sans divulguer à l'équipe","Demander à voir le document officiel pour vérifier","Mettre en place immédiatement des aménagements visibles pour montrer que vous agissez"],ans:1,exp:"La RQTH est une information personnelle et confidentielle. Le salarié choisit qui il en informe. Le manager doit traiter cette information avec la même confidentialité qu'une information médicale — transmettre aux RH pour les aspects administratifs, et ne rien divulguer à l'équipe sans l'accord explicite du salarié.",ref:"Source : Code du travail ; AGEFIPH, guide du management inclusif"},
{q:"Quelle organisation finance les aménagements de postes pour les salariés handicapés en entreprise ?",opts:["La Sécurité Sociale uniquement","La MDPH directement","L'AGEFIPH, qui gère les contributions des entreprises n'atteignant pas le quota","Le salarié lui-même, sur ses propres ressources"],ans:2,exp:"L'AGEFIPH collecte les contributions des entreprises qui n'atteignent pas 6 % de travailleurs handicapés et les réinvestit en aides : financement d'aménagements de postes, aide à l'embauche, formations, maintien dans l'emploi. 97 % des entreprises bénéficiaires s'en déclarent satisfaites.",ref:"Source : AGEFIPH, tableau de bord 2024"},
{q:"Le taux d'emploi des travailleurs handicapés dans le secteur privé en 2024 est de 4 %. Que signifie cet écart avec l'objectif légal de 6 % ?",opts:["Il n'y a pas assez de personnes handicapées qui souhaitent travailler","Beaucoup d'entreprises préfèrent payer la contribution plutôt qu'embaucher","Un effort reste à faire — et chaque entreprise peut contribuer par ses recrutements et son environnement inclusif","Cet écart est inévitable et ne peut pas être réduit"],ans:2,exp:"Cet écart reflète à la fois des difficultés de recrutement, des freins liés aux représentations, et des contributions versées en substitution d'embauches réelles. Chaque entreprise qui crée un environnement véritablement inclusif contribue à réduire cet écart.",ref:"Source : DARES, statistiques OETH 2024 ; AGEFIPH"}
]},

secs:[
{t:"Le premier jour — comment bien accueillir",pts:[
"<strong>La règle d'or : la normalité.</strong> Accueillez un collègue en situation de handicap exactement comme vous accueillez n'importe quel nouveau collègue. La bienveillance exagérée est souvent aussi gênante que l'indifférence — elle stigmatise.",
"<strong>Ne parlez pas de son handicap à sa place :</strong> si vous êtes chargé d'accueillir un nouveau collègue en situation de handicap, ne prévenez pas toute l'équipe à l'avance sans son accord. C'est à lui de décider ce qu'il partage, avec qui et quand.",
"<strong>Lui parler directement :</strong> si la personne est accompagnée (interprète en LSF, accompagnateur), adressez-vous toujours à elle directement — pas à son accompagnateur. Elle est votre interlocuteur, pas la tierce personne.",
"<strong>Les questions :</strong> ne demandez pas d'emblée comment la personne est 'devenue' handicapée ou ce qu'elle 'a'. Ce ne sont pas des questions appropriées entre collègues. Si vous avez un doute sur ce dont elle a besoin pour travailler confortablement, posez-lui la question de façon professionnelle.",
"<div class='enc enc-g'><strong>Ce qui fonctionne vraiment :</strong> 'Y a-t-il quelque chose que je puisse faire pour faciliter notre collaboration ?' ou 'Est-ce qu'il y a des choses à savoir pour bien travailler ensemble ?' — des questions ouvertes, professionnelles, qui laissent la personne décider ce qu'elle partage.</div>"
]},
{t:"Au quotidien — les erreurs bienveillantes à éviter",pts:[
"<strong>La surprotection :</strong> vouloir 'protéger' un collègue handicapé de certaines tâches, lui éviter des situations difficiles sans lui demander son avis, ou prendre des décisions à sa place — même avec les meilleures intentions — est vécu comme rabaissant. La personne est adulte et sait ce qu'elle peut faire.",
"<strong>La pitié :</strong> exprimer de la compassion exagérée ou de l'admiration excessive ('c'est courageux de venir travailler malgré ça') est maladroit. Une personne en situation de handicap fait simplement son travail — comme tout le monde. Ce n'est pas héroïque.",
"<strong>Les blagues :</strong> les plaisanteries sur le handicap, même légères, créent un environnement psychologiquement peu sûr pour les personnes concernées. Elles peuvent sembler anodines pour ceux qui les font mais être blessantes pour ceux qui les subissent.",
"<strong>La curiosité déplacée :</strong> poster une photo de l'aménagement de poste d'un collègue, commenter sa façon de travailler devant d'autres, ou relayer des informations sur son handicap sans son accord — sont des comportements à éviter, quelle que soit l'intention.",
"<div class='sit'><div class='sit-lbl'>Situation en entreprise</div><div class='sit-txt'>Claire arrive dans une nouvelle équipe. Elle est malvoyante et utilise un logiciel d'agrandissement sur son écran. Dès le premier jour, sa responsable présente Claire à l'équipe en disant 'comme vous le savez, Claire a un problème de vue'. Claire n'avait pas souhaité que cette information soit partagée de cette façon. Résultat : elle se sent définie par son handicap avant d'avoir pu montrer ses compétences.</div></div>"
]},
{t:"Créer un environnement vraiment inclusif — les actions collectives",pts:[
"<strong>Les réunions accessibles :</strong> envoyer les documents à l'avance (utile pour tous mais essentiel pour certains), choisir des salles accessibles, s'assurer que les présentations sont lisibles, ne pas organiser de réunions debout si un collègue ne peut pas rester debout.",
"<strong>La communication écrite :</strong> utiliser des polices lisibles, des contrastes suffisants, éviter les documents uniquement en image ou en PDF non accessible. Ces bonnes pratiques bénéficient à tous.",
"<strong>Normaliser les différences :</strong> dans une équipe inclusive, les aménagements de poste sont vus comme normaux — comme l'est un bureau ergonomique pour quelqu'un qui a le dos fragile. Plus l'équipe normalise ces différences, plus les personnes handicapées se sentent à l'aise.",
"<strong>Votre propre rôle :</strong> l'inclusion en entreprise ne repose pas uniquement sur le manager ou les RH. Chaque collègue contribue par son comportement quotidien à rendre l'environnement plus ou moins inclusif.",
"<div class='enc enc-b'><strong>Chiffre AGEFIPH 2025 :</strong> 80 % des salariés perçoivent le travail avec une personne handicapée comme source d'enrichissement. Les équipes mixtes — incluant des personnes en situation de handicap — développent souvent davantage de créativité et d'adaptabilité collective.</div>"
]}
],
quiz:[
{q:"Vous accueillez un nouveau collègue en situation de handicap visible. Quelle est la première chose à faire ?",opts:["Prévenir toute l'équipe de son handicap pour qu'ils soient préparés","L'accueillir exactement comme tout nouveau collègue, sans mettre en avant son handicap","Vérifier avec lui tous les aménagements nécessaires avant qu'il rencontre l'équipe","Lui demander de vous expliquer son handicap pour mieux l'aider"],ans:1,exp:"La règle d'or est la normalité. Accueillir un collègue en situation de handicap de la même façon que tout autre collègue évite de le définir par son handicap avant même d'avoir montré ses compétences. C'est lui qui décide ce qu'il partage, avec qui et quand.",ref:"Source : AGEFIPH, guide de l'accueil inclusif"},
{q:"Un collègue vous dit : 'C'est vraiment courageux de ta part de venir travailler malgré ton handicap.' Pourquoi cette remarque est-elle maladroite ?",opts:["Elle n'est pas maladroite — c'est une marque de respect et d'empathie","Elle sous-entend que la personne handicapée n'est pas 'normale' et fait quelque chose d'héroïque pour simplement travailler","Elle révèle le handicap de la personne à des tiers","Elle est maladroite uniquement si la personne n'a pas déclaré son handicap"],ans:1,exp:"Exprimer de l'admiration ou de la pitié pour le fait de 'travailler malgré' un handicap implique que la personne fait quelque chose d'exceptionnel pour simplement faire son travail. Une personne en situation de handicap est simplement un professionnel qui travaille, comme tous ses collègues.",ref:"Source : AGEFIPH, guide du bon comportement inclusif"},
{q:"Votre collègue en situation de handicap auditif est accompagné d'un interprète en réunion. À qui adressez-vous votre discours ?",opts:["À l'interprète — il est le relais de communication","Au groupe en général, en regardant alternativement les deux","Directement à votre collègue — il est votre interlocuteur, pas l'interprète","Vous adaptez selon les sujets abordés"],ans:2,exp:"La règle est claire : adressez-vous toujours à la personne directement, pas à son accompagnateur ou interprète. L'interprète est un outil de communication, pas un intermédiaire décisionnel. Regarder et parler à votre collègue directement est respectueux et naturel.",ref:"Source : Guides d'accueil des personnes en situation de handicap — Gouvernement français"},
{q:"Envoyer les documents de réunion à l'avance est une bonne pratique d'inclusion. Qui en bénéficie ?",opts:["Uniquement les personnes en situation de handicap cognitif","Uniquement les personnes malvoyantes","Tout le monde — c'est un exemple de 'conception universelle'","Personne — cela génère trop d'emails en amont"],ans:2,exp:"C'est un exemple de 'conception universelle' ou 'design universel' : une pratique conçue pour répondre aux besoins de personnes en situation de handicap qui améliore l'expérience de tous. Envoyer les documents à l'avance aide les personnes cognitives, malvoyantes, anxieuses, ou simplement toute personne qui préfère se préparer.",ref:"Source : AGEFIPH, pratiques inclusives en entreprise"},
{q:"Vous apprenez par un autre collègue qu'une personne de l'équipe est en situation de handicap. Que faites-vous de cette information ?",opts:["Vous la partagez avec les collègues proches pour qu'ils soient prévenants","Vous demandez confirmation directement à la personne concernée","Vous gardez cette information pour vous — elle vous a été transmise sans l'accord de la personne concernée","Vous en informez les RH pour qu'ils mettent des aménagements en place"],ans:2,exp:"Les informations sur le handicap d'une personne sont personnelles et confidentielles. Si elles vous parviennent sans que la personne les ait partagées elle-même, ne les relayez pas. La personne est seule décisionnaire de ce qu'elle partage, avec qui et quand.",ref:"Source : RGPD — données de santé ; Code du travail"}
]},

{id:4,cl:"#E8F4E8",cd:"#0A4020",badge:"Module 5 — Le rôle du manager",
title:"Manager inclusif : accompagner, aménager, maintenir dans l'emploi",
sub:"Les responsabilités légales et humaines du manager face au handicap en entreprise",

secs:[
{t:"Les obligations légales du manager — ce que dit la loi",pts:[
"<strong>La non-discrimination :</strong> l'article L1132-1 du Code du travail interdit toute discrimination en raison du handicap — à l'embauche, dans l'évolution professionnelle, dans la rémunération, dans les conditions de travail. Cette interdiction s'applique à tous les managers, dans toutes leurs décisions.",
"<strong>L'obligation d'aménagements raisonnables :</strong> l'employeur — et donc le manager — est tenu de mettre en œuvre des aménagements raisonnables pour permettre à une personne en situation de handicap d'accéder à l'emploi, de l'exercer et d'y progresser. Refuser des aménagements raisonnables constitue une discrimination.",
"<strong>Ce qu'est un 'aménagement raisonnable' :</strong> un aménagement est raisonnable si son coût et sa complexité sont proportionnés aux bénéfices attendus, compte tenu des aides disponibles (AGEFIPH). Dans la majorité des cas, les aménagements sont peu coûteux : horaires adaptés, logiciel spécifique, bureau ergonomique, organisation des tâches.",
"<strong>Le maintien dans l'emploi :</strong> si un salarié développe un handicap ou une maladie invalidante, le manager a un rôle clé dans la démarche de maintien dans l'emploi — en lien avec le médecin du travail, les RH et l'AGEFIPH.",
"<div class='enc enc-a'><strong>À noter :</strong> un manager ne peut pas demander à un salarié s'il est en situation de handicap, ni l'y contraindre. C'est toujours le salarié qui prend l'initiative de déclarer ou de demander des aménagements.</div>"
]},
{t:"Initier le dialogue — comment aborder le sujet",pts:[
"<strong>La règle de base :</strong> le manager ne prend pas l'initiative de parler du handicap d'un salarié. C'est le salarié qui ouvre ce dialogue, à son rythme. Le manager crée les conditions pour que ce dialogue soit possible — un climat de confiance, de confidentialité, d'écoute.",
"<strong>Si le salarié prend l'initiative :</strong> proposez un entretien en privé. Écoutez sans interrompre, sans minimiser, sans chercher immédiatement des solutions. Garantissez explicitement la confidentialité. Demandez : 'Qu'est-ce qui vous aiderait à travailler dans de meilleures conditions ?'",
"<strong>Si vous observez des difficultés sans en connaître la cause :</strong> abordez les faits professionnels observés, pas les suppositions sur la santé. 'J'ai remarqué que tu sembles fatigué en ce moment, est-ce que tout va bien ? Y a-t-il quelque chose que je puisse faire pour t'aider ?' — sans mentionner le handicap.",
"<strong>Ce que vous ne devez pas faire :</strong> proposer des aménagements sans l'accord du salarié, divulguer des informations à l'équipe, adapter les objectifs à la baisse sans discussion préalable, traiter le salarié différemment de ses collègues.",
"<div class='sit'><div class='sit-lbl'>Situation managériale</div><div class='sit-txt'>Thomas, manager, remarque que Julien — excellent téléopérateur depuis 3 ans — fait de plus en plus d'erreurs et semble épuisé. Thomas lui propose un entretien individuel informel. Il lui demande si tout va bien sans mentionner le handicap. Julien lui confie qu'il vient d'être diagnostiqué bipolaire et ne sait pas comment gérer ses journées. Thomas l'écoute, lui garantit la confidentialité, et propose ensemble d'identifier des aménagements. Il contacte ensuite les RH et le médecin du travail.</div></div>"
]},
{t:"Mobiliser les ressources — vous n'êtes pas seul",pts:[
"<strong>Le médecin du travail :</strong> premier interlocuteur pour tout ce qui concerne la santé au travail. Il peut recommander des aménagements de poste, établir un lien entre les difficultés et l'état de santé, et accompagner la démarche de maintien dans l'emploi. La visite est confidentielle.",
"<strong>L'AGEFIPH :</strong> contactez l'AGEFIPH pour connaître les aides disponibles pour l'aménagement du poste, la formation, ou le maintien dans l'emploi. 97 % des entreprises se déclarent satisfaites des aides reçues. Elles peuvent financer des équipements, des formations, ou de l'accompagnement.",
"<strong>Cap emploi :</strong> si un salarié risque de ne plus pouvoir occuper son poste, Cap emploi accompagne la recherche de solutions — reclassement interne, formation, reconversion. C'est un service gratuit pour l'entreprise et le salarié.",
"<strong>Le référent handicap de l'entreprise :</strong> si votre entreprise dispose d'un référent handicap, c'est votre premier interlocuteur interne. Il connaît les ressources disponibles, peut faire le lien avec les RH et l'AGEFIPH, et sensibilise les équipes.",
"<div class='enc enc-g'><strong>Ce que disent les données AGEFIPH 2025 :</strong> 91 % des employeurs se disent prêts à embaucher une personne en situation de handicap s'ils ont un référent handicap dans leur entreprise. La présence d'un interlocuteur dédié est le levier le plus efficace pour l'inclusion réelle.</div>"
]}
],
quiz:[
{q:"Un salarié en situation de handicap demande à travailler à domicile deux jours par semaine pour faciliter ses déplacements. Le manager peut-il refuser ?",opts:["Oui, si l'organisation du travail l'exige — il n'y a pas d'obligation spécifique","Non — tout refus d'aménagement raisonnable constitue une discrimination au sens de la loi","Oui, si les autres membres de l'équipe n'ont pas le même avantage","Cela dépend du type de handicap"],ans:1,exp:"L'employeur — et donc le manager — est tenu de mettre en œuvre des aménagements raisonnables. Refuser des aménagements raisonnables constitue une discrimination au sens du Code du travail (L1132-1). Le caractère 'raisonnable' s'évalue au regard du coût, de la complexité et des aides disponibles (AGEFIPH).",ref:"Source : Code du travail L1132-1 ; directive européenne 2000/78 ; AGEFIPH"},
{q:"Un manager remarque qu'un salarié semble avoir des difficultés depuis quelques semaines. Il soupçonne un problème de santé. Comment doit-il aborder le sujet ?",opts:["En demandant directement si le salarié est en situation de handicap","En abordant les faits professionnels observés et en demandant si tout va bien, sans mentionner le handicap","En alertant les RH avant de parler au salarié","En attendant que le salarié prenne l'initiative — le manager ne doit rien faire"],ans:1,exp:"Le manager aborde les faits observables (difficultés professionnelles, fatigue visible) sans jamais mentionner le handicap ou la santé. Il crée l'ouverture pour que le salarié puisse s'exprimer s'il le souhaite. La démarche de déclaration reste toujours à l'initiative du salarié.",ref:"Source : AGEFIPH, guide du management inclusif"},
{q:"Quelle organisation peut financer l'aménagement du poste de travail d'un salarié en situation de handicap ?",opts:["La Sécurité Sociale, via les arrêts maladie","L'AGEFIPH, qui propose des aides financières aux entreprises","Le salarié lui-même, avec ses indemnités RQTH","Le Pôle Emploi, dans le cadre du maintien dans l'emploi"],ans:1,exp:"L'AGEFIPH propose des aides financières aux entreprises pour l'aménagement des postes de travail (matériel adapté, logiciels, mobilier), la formation, et le maintien dans l'emploi. 97 % des entreprises bénéficiaires s'en déclarent satisfaites. Ces aides sont accessibles dès lors qu'un salarié est reconnu BOETH.",ref:"Source : AGEFIPH, tableau de bord et guide des aides 2024"},
{q:"Un manager peut-il demander à un salarié s'il est en situation de handicap ?",opts:["Oui — pour pouvoir anticiper les aménagements nécessaires","Oui — si la question est posée de façon bienveillante lors d'un entretien privé","Non — c'est toujours le salarié qui prend l'initiative de déclarer","Oui — lors des entretiens annuels obligatoires"],ans:2,exp:"Un manager ne peut pas demander à un salarié s'il est en situation de handicap, ni l'y contraindre. C'est toujours le salarié qui prend l'initiative de déclarer, à son rythme, et uniquement s'il le souhaite. Le manager crée les conditions d'un dialogue possible — pas la contrainte de l'ouverture.",ref:"Source : Code du travail ; AGEFIPH, guide du management inclusif"},
{q:"Selon les données AGEFIPH 2025, quel est l'effet d'avoir un référent handicap dans l'entreprise sur la propension à embaucher des personnes handicapées ?",opts:["Aucun effet mesurable","Une légère amélioration de 5 à 10 %","91 % des employeurs se disent prêts à embaucher s'ils ont un référent handicap — soit +36 points par rapport aux entreprises sans référent","Un effet négatif — le référent bureaucratise le processus"],ans:2,exp:"Le baromètre AGEFIPH-IFOP 2025 révèle que 91 % des employeurs se disent prêts à embaucher une personne en situation de handicap lorsqu'ils ont un référent handicap dans leur entreprise — soit +36 points par rapport aux entreprises sans référent. La présence d'un interlocuteur dédié est le levier le plus efficace.",ref:"Source : Baromètre AGEFIPH-IFOP 2025, 8ème édition"}
]}
];

function checkPwd(){
  const v=document.getElementById('pwd-input').value.trim().toUpperCase();
  if(v==='TAXITL2026'){document.getElementById('pwd-screen').style.display='none';}
  else{document.getElementById('pwd-error').textContent='Code incorrect';document.getElementById('pwd-input').value='';document.getElementById('pwd-input').focus();}
}

function dots(){
  document.getElementById("top-bar").style.display="flex";
  let c=document.getElementById("dots");c.innerHTML="";
  M.forEach((_,i)=>{let d=document.createElement("div");d.className="dot"+(st.done.has(i)?" done":i===st.mi?" active":"");c.appendChild(d);});
  document.getElementById("top-lbl").textContent="Module "+(st.mi+1)+" / "+M.length;
}

function render(){
  let sc=document.getElementById("screen"),m=M[st.mi];
  if(st.ph==="id"){
    document.getElementById("app-head").style.display="block";
    document.getElementById("top-bar").style.display="none";
    sc.innerHTML=`<div class="id-wrap">
      <div class="id-head">
        <img id="id-logo" style="height:80px;width:auto;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto" alt="Taxi TL"/>
        <h2>Identification du participant</h2>
        <p>Ces informations figureront sur votre certificat. Merci de les renseigner avec précision.</p>
      </div>
      <div class="field"><label>Nom de famille</label><input type="text" id="fn" placeholder="Votre nom" autocomplete="family-name"/></div>
      <div class="field"><label>Prénom</label><input type="text" id="fp" placeholder="Votre prénom" autocomplete="given-name"/></div>
      <div class="field"><label>Service</label><select id="fs">
        <option value="">— Sélectionnez votre service —</option>
        <option>Téléopérateurs</option><option>Ressources Humaines</option>
        <option>Encadrement / Management</option><option>Service Commercial</option><option>Direction</option>
      </select></div>
      <div class="id-note">Vos données restent sur votre appareil. Le certificat est à remettre à votre responsable RH.</div>
      <button class="btn-main" onclick="go()">Commencer la formation ›</button>
    </div>`;
    // Injecter le logo
    if(st.logo_src){document.getElementById('id-logo').src=st.logo_src;}
    return;
  }
  if(st.ph==="content"){
    document.getElementById("app-head").style.display="none";dots();
    sc.innerHTML=`<div class="card">
      <div class="card-header">
        <div class="mod-badge" style="background:${m.cl};color:${m.cd}">${m.badge}</div>
        <div class="card-title">${m.title}</div>
        <div class="card-sub">${m.sub}</div>
      </div>
      <div class="card-body">
        <div class="illu">${m.svg}</div>
        <div class="obj"><div class="obj-label">Objectif pédagogique</div><div class="obj-text">${m.obj}</div></div>
        ${m.secs.map(s=>`<div class="section"><div class="stitle">${s.t}</div>${s.pts.map(p=>`<div class="pt">${p}</div>`).join("")}</div>`).join("")}
        <div class="src">Références : ${m.ref}</div>
        <button class="btn-main" onclick="quiz()">J'ai lu et compris — passer à l'évaluation ›</button>
      </div>
    </div>`;
  }
  else if(st.ph==="quiz"){
    dots();
    let q=m.quiz[st.qi],givenAns=st.qa[st.qi];
    let nbRatees=st.queue.filter(idx=>st.qa[idx]!==undefined).length;
    sc.innerHTML=`<div class="card">
      <div class="card-header">
        <div class="mod-badge" style="background:${m.cl};color:${m.cd}">${m.badge} — Évaluation</div>
        <div class="card-sub">${nbRatees>0?`<span style="color:#E24B4A;font-weight:600">${nbRatees} question${nbRatees>1?"s":""} à reprendre</span>`:"Les questions incorrectes reviennent automatiquement"}</div>
      </div>
      <div class="card-body">
        <div class="qbar">${m.quiz.map((_,i)=>{let s=st.qa[i]===undefined?"#C8D3E0":st.qa[i]===m.quiz[i].ans?"#1A56A0":"#E24B4A";let cur=st.queue[0]===i;return`<div class="qb" style="background:${s};${cur?"outline:2px solid #0D3875;outline-offset:2px":""}"></div>`;}).join("")}</div>
        <div class="qmeta"><span class="qn">Questions restantes : ${st.queue.length}</span><span class="qsc">${m.quiz.filter((_,i)=>st.qa[i]===m.quiz[i].ans).length} / ${m.quiz.length} validées</span></div>
        <div class="qtxt">${st.qa[st.qi]!==undefined&&st.qa[st.qi]!==m.quiz[st.qi].ans?'<span style="font-size:12px;color:#E24B4A;font-weight:500;display:block;margin-bottom:6px">Reprise — répondez à nouveau</span>':""
        }${q.q}</div>
        <div class="opts">${q.opts.map((o,i)=>{let cl="opt";if(givenAns!==undefined){if(i===q.ans)cl+=" ok";else if(i===givenAns)cl+=" ko";}return`<button class="${cl}"${givenAns!==undefined?" disabled":""} onclick="ans(${i})">${o}</button>`;}).join("")}</div>
        ${givenAns!==undefined?`
        <div class="fb ${givenAns===q.ans?"ok":"ko"}">
          <div class="fb-t">${givenAns===q.ans?"Bonne réponse !":"Pas tout à fait — cette question reviendra"}</div>${q.exp}
          <div class="fb-r">${q.ref}</div>
        </div>
        <div style="text-align:center;margin-top:1rem;font-size:13px;color:#5C6B80">${givenAns===q.ans?"Question suivante dans 2 secondes…":"Passage automatique…"}</div>
        `:""
      }
      </div>
    </div>`;
  }
  else if(st.ph==="quiz_done"){
    dots();
    sc.innerHTML=`<div class="card"><div class="card-header"><div class="mod-badge" style="background:${m.cl};color:${m.cd}">${m.badge}</div></div>
    <div class="card-body"><div class="box-ok">
      <h3>Module validé !</h3>
      <p>Toutes les questions ont été répondues correctement.<br>Ce module est enregistré dans votre parcours.</p>
      <button class="btn-ok" onclick="next()">${st.mi<M.length-1?"Module suivant →":"Obtenir mon certificat →"}</button>
    </div></div></div>`;
  }
  else if(st.ph==="final"){
    document.getElementById("top-bar").style.display="none";
    let now=new Date(),ds=now.toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});
    let ref="HDC-"+now.getFullYear()+String(now.getMonth()+1).padStart(2,"0")+String(now.getDate()).padStart(2,"0")+"-"+usr.n.substring(0,3).toUpperCase()+usr.p.substring(0,2).toUpperCase();
    sc.innerHTML=`
    <div class="cert">
      <div class="cert-top">
        ${st.logo_src?`<img src="${st.logo_src}" alt="Taxi TL" style="height:56px;width:auto;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;filter:brightness(0) invert(1)"/>`:""}
        <h2>Certificat de sensibilisation au Handicap</h2>
        <p>Inclusion, diversité et emploi des personnes en situation de handicap<br>Programme de sensibilisation professionnelle — Taxi TL</p>
      </div>
      <div class="cert-body">
        <div class="cert-comp"><span>Conforme Passeport Prévention · Loi 2021-1018 · Basé sur Loi 2005-102, AGEFIPH, Ministère du Travail</span></div>
        <div class="cert-who">
          <div class="lbl">Ce certificat est délivré à</div>
          <div class="nm">${usr.p} ${usr.n}</div>
          <div class="svc">${usr.s}</div>
        </div>
        <div class="cert-stmt">A suivi et validé avec succès le programme de sensibilisation au handicap composé de ${M.length} modules avec évaluation des acquis. Compétences transférables vers tout poste de travail similaire.</div>
        <div class="cert-mods">
          ${M.map(m=>`<div class="cert-mod">
            <div class="cert-ck">✓</div>
            <div class="cert-info">
              <div class="cert-mn">${m.badge} — ${m.title}</div>
              <div class="cert-mr">${m.ref.split("·")[0].trim()}</div>
            </div>
          </div>`).join("")}
        </div>
        <div class="cert-ft">
          <div class="cert-fi"><div class="lbl">Date de validation</div><div class="val">${ds}</div></div>
          <div class="cert-fi"><div class="lbl">Durée estimée</div><div class="val">${M.length} modules · 45 à 60 min</div></div>
          <div class="cert-fi"><div class="lbl">Référence dossier</div><div class="val">${ref}</div></div>
        </div>
        <div style="border-top:0.5px solid #E5EBF2;padding-top:10px;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
          ${st.logo_src?`<img src="${st.logo_src}" alt="Taxi TL" style="height:40px;width:auto"/>`:""}
          <div style="text-align:right;font-size:11px;color:#5C6B80;line-height:1.6">
            <div style="font-weight:600;color:#1a1a2e">Taxi TL</div>
            <div>L'excellence comme moteur, depuis 1971</div>
          </div>
        </div>
        <div class="cert-sig">
          Formation interne Taxi TL · Dispensée en e-learning autonome · À déclarer sur passeport-prevention.travail-emploi.gouv.fr<br>
          Objectifs pédagogiques définis par module · Évaluation des acquis · Compétences transférables · Traçabilité nominative<br>
          Ce document constitue une attestation de formation au sens de la Loi 2021-1018 du 2 août 2021
        </div>
      </div>
    </div>
    <div class="print-row">
      <button class="btn-print" onclick="window.print()">Imprimer le certificat</button>
      <button class="btn-mail" onclick="tip()">Guide PDF par mail</button>
    </div>
    <div class="mail-tip" id="mtip">
      <strong>Pour créer un PDF :</strong> Imprimer → "Enregistrer en PDF" → Enregistrer → Envoyer à votre RH.
    </div>`;
  }
}

function quiz(){st.ph="quiz";st.qa={};st.queue=M[st.mi].quiz.map((_,i)=>i);st.qi=st.queue[0];render();}
function go(){
  let n=document.getElementById("fn").value.trim(),p=document.getElementById("fp").value.trim(),s=document.getElementById("fs").value;
  if(!n||!p||!s){alert("Merci de renseigner votre nom, prénom et service.");return;}
  usr={n,p,s};st.ph="content";render();
}
function ans(i){
  if(st.qa[st.qi]!==undefined && st.qa[st.qi]===M[st.mi].quiz[st.qi].ans)return;
  st.qa[st.qi]=i;
  let m=M[st.mi];
  let correct=(i===m.quiz[st.qi].ans);
  let savedQi=st.qi;
  render();
  setTimeout(()=>{
    if(correct){
      st.queue.shift();
    } else {
      st.queue.shift();
      st.qa[savedQi]=undefined;
      st.queue.push(savedQi);
    }
    if(st.queue.length===0){
      st.done.add(st.mi);
      st.ph="quiz_done";
    } else {
      st.qi=st.queue[0];
    }
    render();
  },2500);
}
function next(){
  if(st.mi<M.length-1){
    st.mi++;st.ph="content";st.qi=0;st.qa={};
    // Réinitialiser la file pour le nouveau module
    st.queue=[];
  } else {
    st.ph="final";
  }
  render();
}
function tip(){let t=document.getElementById("mtip");t.style.display=t.style.display==="block"?"none":"block";}
render();
</script>
</body>
</html>
